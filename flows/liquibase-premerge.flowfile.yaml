globalVariables:
  TAG: ${LB_TAG}
  CLONED_URL: ${LB_CLONED_URL}
  
stages:

  # Validate changes
  Validation:
    actions: 
      - type: liquibase
        command: validate

  Status:
    actions:
      - type: liquibase
        command: status
        cmdArgs: {verbose: true}

      - type: control
        if: "status.changesetCount == 0"
        command: exit
        cmdArgs: {exitCode: 0, exitMessage: "Exiting with an error status of 0 because the database is up-to-date"}

  # Moved to separate flow
  # Checks-Changelog:
  #  actions:
  #    - type: liquibase
  #      command: checks run
  #      cmdArgs: {checks-scope: changelog, changeset-filter: "PENDING"}
  #      globalArgs: { reports-name: "checks-report-premerge-changelog.html"}

  Update-SQL:
    actions:
      - type: liquibase
        command: update-sql

  # Create Clone Database
  Create-EphemeralDB:
    actions:
      - type: shell
        command: |
          export PGPASSWORD="${LIQUIBASE_COMMAND_PASSWORD}"
          pg_dump -h "${LB_HOSTNAME}" -p "${LB_PORT}" -U "${LIQUIBASE_COMMAND_USERNAME}" -d "${LB_DATABASENAME}" -F c -n "${LB_SCHEMAS}" -n "${LIQUIBASE_LIQUIBASE_SCHEMA_NAME}" --schema-only -f "${LB_DATABASENAME}_dump"
          pg_dump -h "${LB_HOSTNAME}" -p "${LB_PORT}" -U "${LIQUIBASE_COMMAND_USERNAME}" -d "${LB_DATABASENAME}" -F c -t "${LIQUIBASE_LIQUIBASE_SCHEMA_NAME}.DATABASECHANGELOG" --data-only -f "${LB_DATABASENAME}_dbcl_data"
          
          psql -h "${LB_HOSTNAME}" -p "${LB_PORT}" -U "${LIQUIBASE_COMMAND_USERNAME}" -d "${LB_DATABASENAME}" -c "CREATE DATABASE ${LB_DATABASENAME}_eph;"
          # Loop through each schema in the list
          echo "Schema List: ${LB_SCHEMAS}"
          for schema in "${LB_SCHEMAS}"; do
            echo "Creating schema: $schema"
            psql -h "${LB_HOSTNAME}" -p "${LB_PORT}" -U "${LIQUIBASE_COMMAND_USERNAME}" -d "${LB_DATABASENAME}_eph" -c "CREATE SCHEMA IF NOT EXISTS $schema;"
          done
          psql -h "${LB_HOSTNAME}" -p "${LB_PORT}" -U "${LIQUIBASE_COMMAND_USERNAME}" -d "${LB_DATABASENAME}_eph" -c "CREATE SCHEMA IF NOT EXISTS ${LIQUIBASE_LIQUIBASE_SCHEMA_NAME};"
          
          pg_restore -h "${LB_HOSTNAME}" -p "${LB_PORT}" -U "${LIQUIBASE_COMMAND_USERNAME}" -d "${LB_DATABASENAME}_eph" -F c -n "${LB_SCHEMAS}" -n "${LIQUIBASE_LIQUIBASE_SCHEMA_NAME}" --schema-only "${LB_DATABASENAME}_dump"
          pg_restore -h "${LB_HOSTNAME}" -p "${LB_PORT}" -U "${LIQUIBASE_COMMAND_USERNAME}" -d "${LB_DATABASENAME}_eph" --data-only "${LB_DATABASENAME}_dbcl_data"
        
  # Deploy to ephemeral database
  Tag-and-Deploy-to-EphemeralDB:
    actions:
      - type: liquibase
        command: tag
        cmdArgs: { URL: "${CLONED_URL}", tag: "${TAG}" }
        
      # Run the update (with testing rollback)
      - type: liquibase
        command: update-testing-rollback
        cmdArgs: { URL: "${CLONED_URL}", reports-name: "clone-report.html" }

      - type: liquibase
        command: history
        cmdArgs: { URL: "${CLONED_URL}" }
        
endStage:
  actions:
   # Drop Ephemeral Database if it exists   
    - type: shell
      command: |
        export PGPASSWORD="${LIQUIBASE_COMMAND_PASSWORD}"
        psql -h "${LB_HOSTNAME}" -p "${LB_PORT}" -U "${LIQUIBASE_COMMAND_USERNAME}" -d "${LB_DATABASENAME}" -c "DROP DATABASE IF EXISTS demo_db_dev_eph;"

